<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="{{url_for('static', filename='explorso_favicon.png')}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Dive Deeper - ExplorSO</title>
  </head>
  <body>
    <main class="dd-page">
      <img src="{{url_for('static', filename='explorso_dive.png')}}" id="dd-dive-img">
      <section class="dd-main">
            <a href="{{ url_for('index') }}"><button>Home</button></a>
            <h1>Creatures you may find:</h1>
            <h1 id="dd-coords">at Coordinates: <b>{{ lat }}, {{ long }}</b></h1>
            <h1 id="dd-depth">with a max Depth of: <b>{{ dep }} meters</b></h1>
        <section class="dd-creatures">
            {% for item in creatures %}
                <div class="creature">
                    <img src="{{item['image_url']}}">
                    <p>{{item['name']}}</p>
                    <p><i>{{item['scientific_name']}}</i></p>
                </div>
            {% endfor %}
        </section>
      </section>
    </main>
  </body>
</html>
